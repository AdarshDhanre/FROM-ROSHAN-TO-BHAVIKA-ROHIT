<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Happy Birthday Bhavika & Rohit 🎉</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
    background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
    overflow: hidden;
}

/* Heading */
h1 {
    margin-top: 40px;
    font-size: 3rem;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff0080; }
    to { text-shadow: 0 0 25px #ff33cc; }
}

/* Carousel */
.carousel {
    margin: 80px auto;
    width: 300px;
    height: 300px;
    perspective: 1200px;
}

.carousel-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotate 20s infinite linear;
}

.carousel-inner img {
    position: absolute;
    width: 230px;
    height: 230px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px white;
}

@keyframes rotate {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* Wishes */
.wishes {
    position: absolute;
    bottom: 20px;
    width: 100%;
    font-size: 1.2rem;
    white-space: nowrap;
    overflow: hidden;
}

.wishes span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 20s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    border-radius: 50%;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}

/* Hearts */
.heart {
    position: fixed;
    bottom: 0;
    font-size: 20px;
    animation: floatHeart 6s linear forwards;
}

@keyframes floatHeart {
    to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Bhavika & Rohit 🎂</h1>

<div class="carousel">
    <div class="carousel-inner">
        <img src="images/1.jpg" style="transform: rotateY(0deg) translateZ(500px);">
        <img src="images/2.jpg" style="transform: rotateY(45deg) translateZ(500px);">
        <img src="images/3.jpg" style="transform: rotateY(90deg) translateZ(500px);">
        <img src="images/4.jpg" style="transform: rotateY(135deg) translateZ(500px);">
        <img src="images/5.jpg" style="transform: rotateY(180deg) translateZ(500px);">
        <img src="images/6.jpg" style="transform: rotateY(225deg) translateZ(500px);">
        <img src="images/7.jpg" style="transform: rotateY(270deg) translateZ(500px);">
        <img src="images/8.jpg" style="transform: rotateY(315deg) translateZ(500px);">
    </div>
</div>

<h2>💖 Wishing you a day full of happiness, love & joy! 💖</h2>

<div class="wishes">
<span>
🎂 Happy Birthday Bhavika & Rohit! 🎉 Stay blessed 💖 Keep Smiling 🌸 Shine Bright ✨ Lots of Love 💕
Wishing you both a day filled with love, laughter, and happiness!
</span>
</div>

<!-- Music -->
<audio id="song" src="audio/audio.mp3" loop></audio>

<script>
// Play music on click
document.body.addEventListener("click", () => {
    document.getElementById("song").play();
}, {once:true});

// Confetti
function createConfetti() {
    const el = document.createElement("div");
    el.classList.add("confetti");
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.background = `hsl(${Math.random()*360},100%,50%)`;
    el.style.animationDuration = (Math.random()*3+2) + "s";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}
setInterval(createConfetti, 200);

// Hearts
function createHeart() {
    const el = document.createElement("div");
    el.classList.add("heart");
    el.innerHTML = "💖";
    el.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 6000);
}
setInterval(createHeart, 800);
</script>

</body>
</html>
